<!DOCTYPE html>
<html>
<head>
    <title>Bluedot Scanner</title>
    <link rel="icon" href="data:,">
</head>
<body>
    <h1>Welcome to Bluedot Scanner</h1>
    <ul id="fallback-list"></ul>

    <script>
        const fallbackData = [
            {
                id: 1,
                name: 'Fallback Item 1',
                value: 'N/A'
            },
            {
                id: 2,
                name: 'Fallback Item 2',
                value: 'N/A'
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const list = document.getElementById('fallback-list');

            fallbackData.forEach(function(item) {
                const li = document.createElement('li');
                li.textContent = `${item.name}: ${item.value}`;
                list.appendChild(li);
            });
        });
    </script>
</body>
</html>
